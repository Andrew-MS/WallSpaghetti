<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WallSpaghetti — Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 3rem;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
      max-width: 480px;
    }
    .emoji { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #8b949e; margin-top: 0.75rem; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.25rem 0.75rem;
      background: #388bfd22;
      border: 1px solid #388bfd;
      border-radius: 999px;
      color: #388bfd;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🦞</div>
    <h1>Hello, WallSpaghetti</h1>
    <p>TheClaw is online. POC pipeline is live.</p>
    <span class="badge">poc/hello-world</span>
  </div>
</body>
</html>
